services:
  postgres:
    image: postgres:16
    container_name: research-feed-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: research_feed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: research-feed-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
